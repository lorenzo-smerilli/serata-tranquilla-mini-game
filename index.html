<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stasera, serata tranquilla - Cosarium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="magoo-boy">
        <div id="screen-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="loading-screen" class="hidden">
                <div class="loader-content">
                    <p class="blink">ATTRAVERSAMENTO SOTTOPASSO...</p>
                </div>
            </div>
        </div>

        <div id="crt-monitor">
            <div class="crt-line">PASSI COMPLUTI: <span id="step-count">00000</span></div>
            <div class="crt-line">CARBURANTE ALCOOL: <span id="alcohol-level">100%</span></div>
            <div class="crt-line">VITE: <span id="lives-display">❤️❤️❤️</span></div>
        </div>

        <div id="controls">
            <div id="d-pad">
                <div class="pad-btn up" id="pad-up"></div>
                <div class="pad-btn left" id="pad-left"></div>
                <div class="pad-btn right" id="pad-right"></div>
                <div class="pad-btn down" id="pad-down"></div>
                <div class="pad-center"></div>
            </div>

            <div id="action-buttons">
                <button id="btn-b" class="action-btn">B</button>
                <button id="btn-a" class="action-btn">A</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
