<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Navigatore PSG Retro - Cosarium</title>
    <!-- Includiamo la libreria del Navigatore -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="magoo-boy">
        <!-- CONTENITORE SCHERMO -->
        <div id="screen-container">
            <!-- Il Navigatore vero e proprio lavora qui sotto -->
            <div id="map-hidden"></div>
            <!-- Il Canvas applica i filtri grafici e disegna il gameplay sopra Maps -->
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <!-- MONITOR CRT DATI SMARTWATCH -->
        <div id="crt-monitor">
            <div class="crt-line">PASSI: <span id="step-count">00000</span></div>
            <div class="crt-line">ALCOOL: <span id="alcohol-level">100%</span></div>
            <div class="crt-line">STATO: <span id="status-display">SOBRIO</span></div>
        </div>

        <!-- CONTROLLI GIGANTI -->
        <div id="controls">
            <div id="d-pad">
                <div class="pad-btn up" id="pad-up"></div>
                <div class="pad-btn left" id="pad-left"></div>
                <div class="pad-btn right" id="pad-right"></div>
                <div class="pad-btn down" id="pad-down"></div>
                <div class="pad-center"></div>
            </div>

            <div id="action-buttons">
                <button id="btn-b" class="action-btn">B</button>
                <button id="btn-a" class="action-btn">A</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
